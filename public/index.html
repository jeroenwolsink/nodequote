<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quote Beam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Nunito+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/ui/style.css" />
  </head>
  <body>
    <div class="ambient ambient-a" aria-hidden="true"></div>
    <div class="ambient ambient-b" aria-hidden="true"></div>

    <main class="stage">
      <p class="eyebrow">NodeQuote API</p>
      <h1>Daily Spark</h1>

      <article class="quote-card" aria-live="polite">
        <blockquote id="quote-content">Loading a quote...</blockquote>
        <p id="quote-author" class="author"></p>
      </article>

      <button id="new-quote-btn" type="button">New Quote</button>
      <p id="status" class="status">Fetching from the API...</p>
    </main>

    <script src="/ui/app.js" defer></script>
  </body>
</html>
